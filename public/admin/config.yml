locale: 'de'

# Editorial workflow: jede Änderung ist zunächst ein Entwurf und wird erst
# nach Klick auf "Veröffentlichen" live. Verhindert versehentliches Publizieren.
publish_mode: editorial_workflow

backend:
  name: git-gateway
  branch: master
  commit_messages:
    create: 'Neue Übung: {{collection}} „{{slug}}"'
    update: 'Übung aktualisiert: {{collection}} „{{slug}}"'
    delete: 'Übung gelöscht: {{collection}} „{{slug}}"'
    uploadMedia: 'Bild hochgeladen: {{path}}'
    deleteMedia: 'Bild gelöscht: {{path}}'

media_folder: 'public/images/uebungen'
public_folder: '/images/uebungen'

collections:
  - name: 'aufwaermen'
    label: 'Aufwärmen'
    label_singular: 'Aufwärm-Übung'
    description: 'Übungen zum Aufwärmen zu Beginn des Trainings.'
    folder: 'src/data/uebungen'
    create: true
    delete: true
    slug: 'aufwaermen-{{slug}}'
    extension: 'md'
    format: 'frontmatter'
    media_folder: '/public/images/uebungen/aufwaermen'
    public_folder: '/images/uebungen/aufwaermen'
    filter:
      field: category
      value: aufwaermen
    sortable_fields: ['order', 'title']
    editor:
      preview: false
    fields:
      - { label: 'Kategorie', name: 'category', widget: 'hidden', default: 'aufwaermen' }
      - { label: 'Name der Übung', name: 'title', widget: 'string', required: true, hint: 'Kurzer, eindeutiger Name — erscheint als Überschrift der Übung.' }
      - { label: 'Übungsbild', name: 'image', widget: 'image', required: true, hint: 'Foto oder Zeichnung der Übung. Wird auf der Übersicht angezeigt.' }
      - { label: 'Reihenfolge', name: 'order', widget: 'number', default: 0, required: false, value_type: 'int', hint: 'Kleinere Zahl = weiter vorne. Leer lassen ist ok — Übungen werden dann alphabetisch sortiert.' }
      - { label: 'Beschreibung (optional)', name: 'description', widget: 'text', required: false, hint: 'Was trainiert diese Übung? Wie wird sie durchgeführt? Leer lassen ist ok.' }
      - { label: 'Video-Link (optional)', name: 'videoUrl', widget: 'string', required: false, hint: 'YouTube- oder Vimeo-Link (mit http:// oder https:// beginnen). Beispiel: https://youtube.com/watch?v=...' }
      - { label: 'Dauer (optional)', name: 'duration', widget: 'string', required: false, hint: 'Zum Beispiel: „10 Minuten" oder „15 min".' }
      - { label: 'Spielerzahl (optional)', name: 'playerCount', widget: 'string', required: false, hint: 'Zum Beispiel: „8 Spieler" oder „4 vs 4".' }

