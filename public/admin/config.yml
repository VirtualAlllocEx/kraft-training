locale: 'de'

# Öffentliche Site-URL: zeigt im CMS einen „Website ansehen"-Link, damit
# schnell geprüft werden kann, ob eine Veröffentlichung angekommen ist.
site_url: 'https://kraft-training.netlify.app'
display_url: 'https://kraft-training.netlify.app'

# Editorial workflow deaktiviert: verursacht den bekannten Decap-CMS-Bug
# „Cannot read properties of undefined (reading 'path')" beim Bildupload
# via git-gateway (siehe decaporg/decap-cms#7871 u.a.).
# Änderungen werden jetzt direkt auf den master-Branch geschrieben.
# publish_mode: editorial_workflow

# Dateinamen (Slugs) ASCII-sicher machen: „Test Übung" → test-uebung.
# Entspricht der Konvention des Migrationsskripts und verhindert
# Git-Branch-Namen mit Nicht-ASCII-Zeichen im Editorial Workflow.
slug:
  encoding: 'ascii'
  clean_accents: true
  sanitize_replacement: '-'

backend:
  name: git-gateway
  branch: master
  commit_messages:
    create: 'Neue Übung: {{collection}} „{{slug}}"'
    update: 'Übung aktualisiert: {{collection}} „{{slug}}"'
    delete: 'Übung gelöscht: {{collection}} „{{slug}}"'
    uploadMedia: 'Bild hochgeladen: {{path}}'
    deleteMedia: 'Bild gelöscht: {{path}}'

# Hinweis/Limitation: Das 1-MB-Limit (max_file_size) kann in Decap CMS nur
# pro Bild-Feld gesetzt werden (siehe media_library-Block bei jedem
# 'image'-Widget unten). Ein globaler max_file_size-Block auf oberster Ebene
# wird NICHT unterstützt — 'media_library: name: ...' ist nur für externe
# Bibliotheken (Uploadcare/Cloudinary) gedacht; ein unbekannter Name wie
# 'default' führt zu "Missing external media library" und macht das Admin
# unbenutzbar (verifiziert gegen decap-cms-core, Stand 3.3.3).
# Folge: Uploads über die globale Medienbibliothek („Medien" in der
# Kopfleiste) umgehen die Größenprüfung — siehe Hinweis in ANLEITUNG.md.
media_folder: 'public/images/uebungen'
public_folder: '/images/uebungen'

collections:
  - name: 'aufwaermen'
    label: 'Aufwärmen'
    label_singular: 'Aufwärm-Übung'
    description: 'Übungen zum Aufwärmen zu Beginn des Trainings.'
    folder: 'src/data/uebungen'
    create: true
    delete: true
    slug: 'aufwaermen-{{slug}}'
    extension: 'md'
    format: 'frontmatter'
    media_folder: '/public/images/uebungen/aufwaermen'
    public_folder: '/images/uebungen/aufwaermen'
    filter:
      field: category
      value: aufwaermen
    sortable_fields: ['order', 'title']
    editor:
      preview: false
    fields:
      - { label: 'Kategorie', name: 'category', widget: 'hidden', default: 'aufwaermen' }
      - { label: 'Name der Übung', name: 'title', widget: 'string', required: true, hint: 'Kurzer, eindeutiger Name — erscheint als Überschrift der Übung.' }
      - label: 'Übungsbild'
        name: 'image'
        widget: 'image'
        required: true
        media_library:
          config:
            max_file_size: 1048576 # 1 MB
        hint: 'Foto oder Zeichnung der Übung. Am besten quadratisch, unter 1 MB. Wird auf der Übersicht angezeigt.'
      - label: 'Reihenfolge'
        name: 'order'
        widget: 'number'
        required: false
        value_type: 'int'
        hint: 'Kleinere Zahl = weiter vorne. Leer lassen ist ok — sortiert dann nach Name.'
      - { label: 'Beschreibung (optional)', name: 'description', widget: 'text', required: false, hint: 'Was trainiert diese Übung? Wie wird sie durchgeführt? Leer lassen ist ok.' }
      - label: 'Video-Link (optional)'
        name: 'videoUrl'
        widget: 'string'
        required: false
        pattern: ['^https?://.+', 'Muss mit http:// oder https:// beginnen']
        hint: 'YouTube- oder Vimeo-Link. Beispiel: https://youtube.com/watch?v=...'
      - { label: 'Dauer (optional)', name: 'duration', widget: 'string', required: false, hint: 'Zum Beispiel: „10 Minuten" oder „15 min".' }
      - { label: 'Spielerzahl (optional)', name: 'playerCount', widget: 'string', required: false, hint: 'Zum Beispiel: „8 Spieler" oder „4 vs 4".' }

