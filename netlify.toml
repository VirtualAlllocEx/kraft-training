[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Decap CMS admin panel
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Cache exercise images with revalidation (filenames are not content-hashed,
# so they must not be immutable)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate"

# Cache Astro built assets (hashed filenames)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate"

# HTML pages: always revalidate with the origin so a fresh publish is
# visible on the first reload (no stale-while-revalidate — that made the
# CDN serve old HTML to the service worker's background refresh).
[[headers]]
  for = "/kategorie/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/plan/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/uebung/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service worker: must never be cached so new versions roll out immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Security headers (public site) — must come BEFORE the /admin/* block below.
# Netlify merges [[headers]] blocks that both match a URL, and later blocks
# override earlier ones for the same header key. So the more specific
# /admin/* block MUST be last to win.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate"
    Referrer-Policy = "no-referrer"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-src 'self'; frame-ancestors 'none'"

# Admin panel (Sveltia CMS) — needs broader connect/img/font sources for
# GitHub API and OAuth. This block is LAST so its CSP overrides the /* block.
[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.netlify.com https://*.netlify.com https://*.netlify.app https://api.github.com https://raw.githubusercontent.com; frame-src 'self'; frame-ancestors 'self'"
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), fullscreen=(self)"
